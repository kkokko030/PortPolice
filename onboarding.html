<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortPolice | Onboarding</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            <a href="myhome.html">PortPolice</a>
        </div>
    </header>

    <main class="onboarding-main">
        <section class="onboarding-form-box">

            <div class="onboarding-title">
                <h1>기본 정보를 입력해주세요</h1>
                <p>포트폴리오 카드 추천에 사용할 최소 정보를 선택합니다.</p>
            </div>

            <form class="onboarding-form">

                <div class="form-group full">
                    <label>직무</label>
                    <select>
                        <option value="">직무를 선택해주세요</option>
                        <option value="기획·전략">기획·전략</option>
                        <option value="마케팅·홍보·조사">마케팅·홍보·조사</option>
                        <option value="회계·세무·재무">회계·세무·재무</option>
                        <option value="인사·노무·HRD">인사·노무·HRD</option>
                        <option value="총무·법무·사무">총무·법무·사무</option>
                        <option value="영업·판매·무역">영업·판매·무역</option>
                        <option value="고객상담·TM">고객상담·TM</option>
                        <option value="IT개발·데이터">IT개발·데이터</option>
                        <option value="디자인">디자인</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>지역</label>
                        <input type="text" placeholder="예: 서울, 경기, 부산">
                    </div>

                    <div class="form-group">
                        <label>경력</label>
                        <select>
                            <option value="">경력을 선택해주세요</option>
                            <option value="신입">신입</option>
                            <option value="인턴">인턴</option>
                            <option value="1년 미만">1년 미만</option>
                            <option value="1~3년">1~3년</option>
                            <option value="3~5년">3~5년</option>
                            <option value="5년 이상">5년 이상</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>학력</label>
                        <select>
                            <option value="">학력을 선택해주세요</option>
                            <option value="고등학교 졸업">고등학교 졸업</option>
                            <option value="전문대 재학">전문대 재학</option>
                            <option value="전문대 졸업">전문대 졸업</option>
                            <option value="대학교 재학">대학교 재학</option>
                            <option value="대학교 졸업">대학교 졸업</option>
                            <option value="석사">석사</option>
                            <option value="박사">박사</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>고용형태</label>
                        <select>
                            <option value="">고용형태를 선택해주세요</option>
                            <option value="정규직">정규직</option>
                            <option value="계약직">계약직</option>
                            <option value="인턴">인턴</option>
                            <option value="프리랜서">프리랜서</option>
                            <option value="파트타임">파트타임</option>
                        </select>
                    </div>
                </div>

                <div class="form-group full">
                    <label>자격증</label>
                    <input type="text" placeholder="예: 정보처리기사, SQLD, ADsP">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>자격증 증빙 파일</label>
                        <div class="upload-box" id="certificateUpload">

                            <input type="file" id="certificateFile" accept=".pdf,.jpg,.jpeg,.png" hidden multiple>

                            <div class="upload-content">

                                <div class="upload-icon">
                                    📄
                                </div>

                                <h3>증빙 자료 업로드</h3>

                                <p>
                                    PDF, JPG, PNG 파일을 드래그하거나
                                    클릭하여 업로드하세요.
                                </p>

                                <span class="upload-button">
                                    파일 선택
                                </span>

                                <small id="fileName">
                                    선택된 파일이 없습니다.
                                </small>

                            </div>

                        </div>
                    </div>

                    <div class="form-group">
                        <label>자격증 개수</label>
                        <select id="certificateCount">
                            <option value="">자격증 개수를 선택해주세요</option>
                            <option value="0">없음</option>
                            <option value="1">1개</option>
                            <option value="2">2개</option>
                            <option value="3">3개</option>
                            <option value="4">4개</option>
                            <option value="5">5개</option>
                            <option value="6">6개</option>
                            <option value="7">7개</option>
                            <option value="8">8개</option>
                            <option value="9">9개</option>
                            <option value="10">10개 이상</option>
                        </select>
                    </div>
                </div>
                <p class="form-help">
                    증빙 자료는 포트폴리오 문장의 신뢰도를 높이는 데 사용됩니다.
                </p>

                <button type="button" class="next-btn" id="onboardingNextBtn">
                    다음으로 →
                </button>
            </form>
        </section>
    </main>
    <div class="warning-modal" id="warningModal" hidden>
        <div class="warning-card">
            <h3>아직 입력하지 않은 항목이 있습니다</h3>
            <p id="warningText"></p>
            <button type="button" id="warningCloseBtn">확인</button>
        </div>
    </div>
    <script src="onboarding.js"></script>
</body>

</html>
