<!DOCTYPE html>
<html lang="ko">
<style>
    main.login-wrapper {
        min-height: calc(100vh - 90px);

        display: flex;
        justify-content: center;
        align-items: center;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortPolice | 로그인</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html">PortPolice</a>
        </div>
    </header>

    <main class="login-wrapper">

        <div class="login-container">

            <h2>로그인 / 회원가입</h2>

            <input type="email" placeholder="이메일">

            <input type="password" placeholder="비밀번호">

            <button class="login-btn-main" id="continueBtn">
                계속하기
            </button>
            <div></div>

            <button class="naver-btn">NAVER로 계속하기</button>
            <div></div>
            <button class="kakao-btn">Kakao로 계속하기</button>
            <div></div>
            <button class="google-btn">Google로 계속하기</button>

        </div>

    </main>
    <footer>

    </footer>
    <script src="login.js"></script>
</body>

</html>
